{% extends 'admin/base_admin.html' %}
{% block title %}{% if board %}게시판 수정{% else %}게시판 생성{% endif %}{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('admin.boards') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">
    <i class="bi bi-{% if board %}pencil{% else %}plus-circle{% endif %} me-2"></i>
    {% if board %}게시판 수정{% else %}게시판 생성{% endif %}
  </h4>
</div>

<div class="card shadow-sm" style="max-width:500px">
  <div class="card-body p-4">
    <form method="post">
      {% if not board %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">게시판 코드 <span class="text-danger">*</span></label>
        <input type="text" name="code" class="form-control form-control-sm"
               placeholder="예: free, notice, qna" required maxlength="30"
               pattern="[a-z0-9_\-]+" title="소문자, 숫자, -, _ 만 사용 가능">
        <div class="form-text">소문자, 숫자, -, _ 만 사용 가능. URL에 사용됩니다.</div>
      </div>
      {% else %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">게시판 코드</label>
        <input type="text" class="form-control form-control-sm bg-light" value="{{ board.code }}" disabled>
      </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label fw-semibold small">게시판 이름 <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control form-control-sm"
               value="{{ board.name if board else '' }}" required maxlength="50"
               placeholder="예: 자유게시판">
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold small">타입</label>
        <select name="type" class="form-select form-select-sm">
          <option value="NORMAL" {{ 'selected' if not board or board.type == 'NORMAL' }}>NORMAL (일반)</option>
          <option value="NOTICE" {{ 'selected' if board and board.type == 'NOTICE' }}>NOTICE (공지)</option>
        </select>
      </div>

      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold small">읽기 최소 권한</label>
          <select name="read_role" class="form-select form-select-sm">
            <option value="1" {{ 'selected' if not board or board.read_role == 1 }}>1 - 일반 사용자</option>
            <option value="9" {{ 'selected' if board and board.read_role == 9 }}>9 - 관리자</option>
          </select>
        </div>
        <div class="col">
          <label class="form-label fw-semibold small">쓰기 최소 권한</label>
          <select name="write_role" class="form-select form-select-sm">
            <option value="1" {{ 'selected' if not board or board.write_role == 1 }}>1 - 일반 사용자</option>
            <option value="9" {{ 'selected' if board and board.write_role == 9 }}>9 - 관리자</option>
          </select>
        </div>
      </div>

      <div class="mb-4 form-check">
        <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
               {{ 'checked' if not board or board.is_active }}>
        <label class="form-check-label fw-semibold small" for="isActive">게시판 활성화</label>
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <a href="{{ url_for('admin.boards') }}" class="btn btn-outline-secondary btn-sm">취소</a>
        <button type="submit" class="btn btn-primary btn-sm px-4">
          {% if board %}수정 완료{% else %}생성{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
