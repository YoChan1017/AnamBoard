{% extends 'admin/base_admin.html' %}
{% block title %}사용자 수정{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0"><i class="bi bi-person-gear me-2"></i>사용자 수정</h4>
</div>

<div class="card shadow-sm" style="max-width:500px">
  <div class="card-body p-4">
    <div class="mb-3 p-2 bg-light rounded small text-muted">
      아이디: <strong>{{ user.username }}</strong> &nbsp;|&nbsp;
      가입일: {{ user.created_at.strftime('%Y.%m.%d') }}
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold small">닉네임</label>
        <input type="text" name="nickname" class="form-control form-control-sm"
               value="{{ user.nickname }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">이메일</label>
        <input type="email" name="email" class="form-control form-control-sm"
               value="{{ user.email or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">전화번호</label>
        <input type="tel" name="phone" class="form-control form-control-sm"
               value="{{ user.phone or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">역할</label>
        <select name="role" class="form-select form-select-sm">
          <option value="1" {{ 'selected' if user.role == 1 }}>일반 사용자 (1)</option>
          <option value="9" {{ 'selected' if user.role == 9 }}>관리자 (9)</option>
        </select>
      </div>
      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
               {{ 'checked' if user.is_active }}>
        <label class="form-check-label fw-semibold small" for="isActive">계정 활성화</label>
      </div>
      <div class="d-flex gap-2 justify-content-end">
        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary btn-sm">취소</a>
        <button type="submit" class="btn btn-primary btn-sm px-4">저장</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
