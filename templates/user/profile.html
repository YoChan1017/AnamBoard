{% extends 'base.html' %}
{% block title %}내 정보 수정{% endblock %}
{% block content %}
<div class="row">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-light">
        <h5 class="mb-0 fw-bold"><i class="bi bi-person-gear me-2"></i>내 정보 수정</h5>
      </div>
      <div class="card-body p-4">
        <form method="post">
          <!-- 기본 정보 -->
          <h6 class="fw-semibold text-muted mb-3 border-bottom pb-2">기본 정보</h6>
          <div class="mb-3">
            <label class="form-label small fw-semibold">아이디</label>
            <input type="text" class="form-control form-control-sm bg-light"
                   value="{{ user.username }}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">닉네임 <span class="text-danger">*</span></label>
            <input type="text" name="nickname" class="form-control form-control-sm"
                   value="{{ user.nickname }}" required maxlength="30">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">이메일</label>
            <input type="email" name="email" class="form-control form-control-sm"
                   value="{{ user.email or '' }}">
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label small fw-semibold">전화번호</label>
              <input type="tel" name="phone" class="form-control form-control-sm"
                     value="{{ user.phone or '' }}" placeholder="010-0000-0000">
            </div>
            <div class="col">
              <label class="form-label small fw-semibold">생년월일</label>
              <input type="date" name="birth_date" class="form-control form-control-sm"
                     value="{{ user.birth_date.strftime('%Y-%m-%d') if user.birth_date else '' }}">
            </div>
          </div>

          <!-- 비밀번호 변경 -->
          <h6 class="fw-semibold text-muted mb-3 border-bottom pb-2 mt-4">비밀번호 변경 (선택)</h6>
          <div class="mb-3">
            <label class="form-label small fw-semibold">현재 비밀번호</label>
            <input type="password" name="current_password" class="form-control form-control-sm"
                   autocomplete="current-password">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">새 비밀번호</label>
            <input type="password" name="new_password" class="form-control form-control-sm"
                   minlength="6" autocomplete="new-password">
            <div class="form-text">변경하지 않으려면 비워두세요.</div>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">새 비밀번호 확인</label>
            <input type="password" name="new_password2" class="form-control form-control-sm"
                   autocomplete="new-password">
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">취소</a>
            <button type="submit" class="btn btn-primary btn-sm px-4">
              <i class="bi bi-check-lg me-1"></i>저장
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
