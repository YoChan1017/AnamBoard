{% extends 'base.html' %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h4 class="mb-4 fw-bold text-center"><i class="bi bi-person-plus me-2"></i>회원가입</h4>
        <form method="post">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-semibold">아이디 <span class="text-danger">*</span></label>
              <input type="text" name="username" class="form-control" minlength="4" maxlength="30" required>
              <div class="form-text">4~30자, 대소문자 구분</div>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">비밀번호 <span class="text-danger">*</span></label>
              <input type="password" name="password" class="form-control" minlength="6" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">비밀번호 확인 <span class="text-danger">*</span></label>
              <input type="password" name="password2" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">닉네임 <span class="text-danger">*</span></label>
              <input type="text" name="nickname" class="form-control" maxlength="30" required>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">생년월일</label>
              <input type="date" name="birth_date" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-semibold">전화번호</label>
              <input type="tel" name="phone" class="form-control" placeholder="010-0000-0000">
            </div>
            <div class="col-12">
              <label class="form-label small fw-semibold">이메일</label>
              <input type="email" name="email" class="form-control">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100">가입하기</button>
            </div>
          </div>
        </form>
        <hr class="my-3">
        <div class="text-center small">
          이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
