{% extends 'base.html' %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h4 class="mb-4 fw-bold text-center"><i class="bi bi-box-arrow-in-right me-2"></i>로그인</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label small fw-semibold">아이디</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">비밀번호</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>
        <hr class="my-3">
        <div class="text-center small">
          계정이 없으신가요? <a href="{{ url_for('auth.register') }}">회원가입</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
